  <!-- Magnifying glass -->
  <circle cx="22" cy="23" r="4.5" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="25.2" y1="26.2" x2="27.5" y2="28.5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
